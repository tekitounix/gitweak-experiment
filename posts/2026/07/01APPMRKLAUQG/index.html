<!doctype html><meta charset=utf-8><style>html,body{margin:0;height:100%;background:#0b0e14;overflow:hidden}canvas{display:block}</style>
<canvas id=c width=560 height=200></canvas><script>
const x=c.getContext('2d');let t=0;(function d(){t+=0.03;x.fillStyle='rgba(11,14,20,.2)';x.fillRect(0,0,560,200);
for(let i=0;i<80;i++){const a=t+i*.2;x.fillStyle='hsl('+((i*4+t*40)%360)+',80%,62%)';x.beginPath();
x.arc(280+Math.cos(a*1.1)*(40+i),100+Math.sin(a*1.7)*(30+i*.5),2,0,7);x.fill();}requestAnimationFrame(d);})();
</script>
